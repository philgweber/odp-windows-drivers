# Builds all drivers under drivers/ as part of pull request validation.
#
# SPDX-License-Identifier: MIT
#

name: Build Drivers

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'drivers/**'
      - '.github/workflows/build_*.yml'
  workflow_dispatch:

jobs:
  build-drivers:
    name: Build Windows Drivers (${{ matrix.platform }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ARM64
            path_segment: arm64
          - platform: x64
            path_segment: x64
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Restore All Driver Projects
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Path drivers -Recurse -Filter *.vcxproj | Sort-Object FullName
          if (-not $projects) {
            throw "No .vcxproj files were found under drivers/."
          }

          foreach ($project in $projects) {
            Write-Host "Restoring $($project.FullName)"
            nuget restore $project.FullName -ConfigFile $env:APPDATA\NuGet\NuGet.Config
          }

      - name: Build All Driver Projects
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Path drivers -Recurse -Filter *.vcxproj | Sort-Object FullName
          if (-not $projects) {
            throw "No .vcxproj files were found under drivers/."
          }

          foreach ($project in $projects) {
            Write-Host "Building $($project.FullName)"
            msbuild $project.FullName /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:WarningLevel=4
          }

      - name: Upload Driver Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drivers-${{ matrix.platform }}-Release
          path: |
            drivers/**/${{ matrix.path_segment }}/Release/**/*.sys
            drivers/**/${{ matrix.path_segment }}/Release/**/*.inf
            drivers/**/${{ matrix.path_segment }}/Release/**/*.cat
          if-no-files-found: ignore
